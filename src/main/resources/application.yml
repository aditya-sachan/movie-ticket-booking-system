spring:
  application:
    name: movie-ticket-booking-system
  datasource:
    url: jdbc:postgresql://localhost:5432/movieticketing
    username: postgres
    password: postgres
  jpa:
    hibernate:
      # Flyway owns the schema. Never generate DDL; only validate entities against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

pricing:
  # Flat tax rate applied to the discounted subtotal (0.18 = 18% GST). Configurable.
  tax-rate: 0.18

booking:
  # Maximum seats a single booking may hold.
  max-seats-per-booking: 10

logging:
  level:
    org.flywaydb.core: info
