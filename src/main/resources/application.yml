spring:
  application:
    name: movie-ticket-booking-system
  datasource:
    url: jdbc:postgresql://localhost:5432/movieticketing
    username: postgres
    password: postgres
  jpa:
    hibernate:
      # Flyway owns the schema. Never generate DDL; only validate entities against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    org.flywaydb.core: info
